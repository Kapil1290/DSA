<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        width: 400px;
        height: 400px;
        background-color: rgb(220, 234, 234);
        border: 2px solid black;
        
        display: flex;
        justify-content: center;
        align-items: center;

        transition: all 0.9s 0.1s ease;
    }

    .box:hover{
        transform: rotate(40deg);
        
    }

   
</style>
<body>
    <div class="box">
        HELLO JI
    </div>
</body>
