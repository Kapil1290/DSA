<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Card Slider</title>
    <link rel="stylesheet" href="kun.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 70%;
    max-width: 1200px;
    height: 70%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}


/* LEFT SIDE */

.card-stack {
    width: 500px;
    height: 600px;
    position: relative;
}

.card {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.top {
    width: 280px;
    height: 160px;
    top: 0;
}

.upper {
    width: 380px;
    height: 210px;
    top: 80px;
}

.active {
       width: 540px;
    height: 310px;
    top: 170px;
    z-index: 155;
}

.lower {
    width: 380px;
    height: 180px;
    top: 410px;
    z-index: 15;
}

.bottom {
    width: 280px;
    height: 160px;
    top: 520px;
    position: absolute;
}


/* RIGHT SIDE */

.content {
    text-align: center;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 40px;
}

.buttons button {
    width: 55px;
    height: 55px;
    border: none;
    border-radius: 50%;
    background: white;
    color: #2d4bcf;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
}

h1 {
    font-size: 52px;
    color: #173ca8;
    margin-bottom: 10px;
}

.designation {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

.designation span {
    width: 90px;
    height: 2px;
    background: #173ca8;
}

.designation p {
    letter-spacing: 4px;
    color: #777;
    font-size: 18px;
}

.dots {
    margin-top: 70px;
}

.dots span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #d7d7e8;
    display: inline-block;
    margin: 0 5px;
}

.active-dot {
    background: #173ca8 !important;
    transform: scale(1.3);
}

/* .card bottum{
    position: absolute;
    width: 100px;

} */
</style>
<body>

    <div class="container">


        <div class="card-stack">

            <div class="card top">
                <img src="https://hatrabbits.com/wp-content/uploads/2017/01/random.jpg" alt="">
            </div>

            <div class="card upper">
                <img src="https://cdn.pixabay.com/photo/2021/12/12/20/00/play-6865967_1280.jpg" alt="">
            </div>

            <div class="card active">
                <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg" alt="">
            </div>

            <div class="card lower">
                <img src="https://cdn.pixabay.com/photo/2013/07/25/13/01/stones-167089_1280.jpg" alt="">
            </div>

            <div class="card bottom">
                <img src="https://cdn.packtpub.com/article-hub/articles/8d3ed3502379f18e38a00e04a0d59ab7.jpg" alt="">
            </div>

        </div>


        <div class="content">

            <div class="buttons">
                <button>⬆️</button>
                <button>⬇️</button>
            </div>

            <h1>Luffy kun</h1>

            <div class="designation">
                <span></span>
                <p>MARKETING MANAGER</p>
                <span></span>
            </div>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span class="active-dot"></span>
                <span></span>
            </div>

        </div>

    </div>

</body>

</html>
