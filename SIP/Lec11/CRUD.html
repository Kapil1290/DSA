<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>TO DO List</h1>
        <input id="inp" type="text" required>
        <button>add</button>
        
        <ul id="tasks">

        </ul>

    </div>

    
</body>
<script src="https://code.jquery.com/jquery-4.0.0.js">
    let count=0;
    let tasks = document.getElementById("tasks")
    let btn = document.querySelector("button")
    let inp = document.getElementById("inp")


 

    btn.addEventListener('click', (e)=>{
        let list = document.createElement("li")
        
        let val = inp.value.toUpperCase()
        list.append(val)
        
        tasks.append(list)
        
        ijectDeleteButton(list);
        inp.value=""
        
    })
        function ijectDeleteButton(list){
            let btn = document.createElement("button")
        btn.innerText="Delete"
        btn.id = count;
        btn.style.marginLeft = "20px"
        btn.className = "class-btn"
        console.log(btn.className)
        count++;
        list.append( btn)   

        }

        tasks.addEventListener('click', (e)=>{
            if(e.target.classList.contains('class-btn')){
                let specificbtn = e.target.parentElement;
                specificbtn.remove();
            }
        })




</script>

</html>
