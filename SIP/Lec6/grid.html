<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 100vw;
        height: 100vh;
    }
    .flex{
        height: 100%;
        width: 100%;
        
        display: grid;
        padding: 4rem;
        row-gap: 30px;
        column-gap: 30px;
        /* grid-template-columns: repeat(6, 1fr); */
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: repeat(3, 1fr);
    }
    .b1{
        background-color: rgb(108, 108, 244);
        border: 2px solid rgb(152, 82, 82);
        color: white;
    }
    .header{
        grid-column-start: 1;
        grid-column-end: 4;
    }
</style>
<body>
    <div class="flex">
        <div class="b1 header">Header</div>
        <div class="b1">Hello</div>
        <div class="b1">Hello</div>
        <div class="b1">Hello</div>
        <div class="b1">Hello</div>
        <div class="b1">Hello</div>
    </div>
</body>
</html>
