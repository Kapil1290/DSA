<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        width: 100vw;
        height: 100vh;
    }
    .flex{
        height: 100%;
        width: 100%;
        
        display: grid;
        padding: 4rem;
        gap: 0.5rem;
        /* grid-template-columns: repeat(6, 1fr); */
        /* grid-template-rows: repeat(4, 1fr);
        grid-template-columns: repeat(3, 1fr); */
        grid-template-rows: repeat(6, 1fr);
        grid-template-columns: repeat(1, 1fr);
        
    }
    .b1{
        background-color: rgb(108, 108, 244);
        border: 2px solid rgb(152, 82, 82);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        /* font-size: 3rem; */
        border-radius: 1rem;
    }
    @media (min-width:768px){
        .flex{
            grid-template-rows: repeat(4, 1fr);
        grid-template-columns: repeat(3, 1fr);
        }
          .header, .footer{
        grid-column-start: 1;
        grid-column-end: 4;
    }
    .leftone{
        grid-row-start: 2;
        grid-row-end: 4;
    }
    .righttop{
        grid-column-start: 2;
        grid-column-end: 4;
    }
    }
    /* @media (max-width:768px){
        .flex{
            grid-template-rows: repeat(4, 1fr);
        grid-template-columns: repeat(3, 1fr);
        }
    } */
  
    
</style>
<body>
    <div class="flex">
        <div class="b1 header">Header</div>
        <div class="b1 leftone">Sidebar</div>
        <div class="b1 righttop">Content-1</div>
        <div class="b1">Content-2</div>
        <div class="b1">Content-3</div>
        <div class="b1 footer">footer</div>
    </div>
</body>
</html>
